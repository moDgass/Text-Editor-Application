<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Express Text Editor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- top toolbar containing all editor controls -->
  <div id="toolbar">
    <!-- font family selector -->
    <select id="fontFamily">
      <option value="Arial">Arial</option>
      <option value="'Times New Roman'">Times New Roman</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Verdana">Verdana</option>
      <option value="'Lucida Console'">Lucida Console</option>
      <option value="'Comic Sans MS'">Comic Sans</option>
      <option value="'Pacifico', cursive">Pacifico</option>
      <option value="'Roboto Mono', monospace">Roboto Mono</option>
      <option value="'Lobster', cursive">Lobster</option>
      <option value="'Open Sans', sans-serif">Open Sans</option>
      <option value="'Merriweather', serif">Merriweather</option>
      <option value="'Oswald', sans-serif">Oswald</option>
      <option value="'Raleway', sans-serif">Raleway</option>
      <option value="'Playfair Display', serif">Playfair Display</option>
      <option value="'Source Code Pro', monospace">Source Code Pro</option>
      <option value="'Noto Sans', sans-serif">Noto Sans</option>
      <option value="'Indie Flower', cursive">Indie Flower</option>
    
    </select>

    <!-- font size controls -->
    <button id="decreaseSize">-</button>
    <select id="fontSize">
      <option value="12px">12</option>
      <option value="16px" selected>16</option>
      <option value="20px">20</option>
      <option value="24px">24</option>
      <option value="32px">32</option>
    </select>
    <button id="increaseSize">+</button>

    <!-- formatting buttons -->
    <button id="boldBtn">B</button>
    <button id="italicBtn">I</button>
    <button id="underlineBtn">U</button>

    <!-- alignment options (symbolic icons) -->
    <button class="align" data-align="left" title="Align left">↼</button>
    <button class="align" data-align="center" title="Align center">⇄</button>
    <button class="align" data-align="right" title="Align right">⇀</button>
    <button class="align" data-align="justify" title="Justify">≡</button>

    <!-- color pickers; generated by script -->
    <span id="textColorPicker"></span>
    <span id="bgColorPicker"></span>

    <!-- find/replace toggle -->
    <button id="toggleFind">Find/Replace</button>

    <!-- margin and padding controls -->
    <label>Margin <input type="number" id="marginCtrl" min="0" value="5"></label>
    <label>Padding <input type="number" id="paddingCtrl" min="0" value="5"></label>

    <!-- theme selector -->
    <select id="themeSelector">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="sepia">Sepia</option>
      <option value="ocean">Ocean</option>
      <option value="nightNeon">Night Neon</option>
      <option value="forest">Forest</option>
    </select>
  </div>

  <!-- hidden find/replace panel -->
  <div id="findReplace" class="hidden">
    <input type="text" id="findInput" placeholder="find">
    <input type="text" id="replaceInput" placeholder="replace">
    <button id="doReplace">Replace</button>
  </div>

  <!-- main editable area -->
  <div id="editor" contenteditable="true">Start typing here</div>

  <!-- counters and timer -->
  <div id="counters">
    <span id="charCount">Chars: 0</span>
    <span id="wordCount">Words: 0</span>
    <span id="lineCount">Lines: 1</span>
    <span id="timer">Time: 00:00</span>
    <button id="resetTimer">⏹ Reset Timer</button>
  </div>

  <!-- image insertion area -->
  <div id="imageSection">
    <input type="text" id="imgUrl" placeholder="Image URL">
    <button id="insertImage">Insert Image</button>
    <div id="images"></div>
  </div>

  <script src="/editor.js"></script>
</body>
</html>
